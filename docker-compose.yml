# Docker Compose for better-auth-mp
# Full-stack container orchestration

name: better-auth-mp

services:
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: better-auth-mp-web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - better-auth-mp-network

  db:
    image: postgres:16-alpine
    container_name: better-auth-mp-postgres
    environment:
      POSTGRES_DB: better-auth-mp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - better-auth-mp_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - better-auth-mp-network

networks:
  better-auth-mp-network:
    driver: bridge

volumes:
  better-auth-mp_postgres_data:

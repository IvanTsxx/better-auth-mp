name: better-auth-mp

services:
  postgres:
    image: postgres
    container_name: better-auth-mp-postgres
    environment:
      POSTGRES_DB: better-auth-mp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - better-auth-mp_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  better-auth-mp_postgres_data:
